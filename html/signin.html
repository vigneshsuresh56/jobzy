<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobzy - Create Account</title>
    <link rel="stylesheet" href="../css/signin.css">
    <script src="../js/script.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2 class="logo">Jobzy</h2>
        <h3>Create an Account</h3>
        <p>Join Jobzy and find your dream job today</p>
        
        <form id="signupForm" novalidate>
            <div class="input-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" placeholder="Enter your full name" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>
        
        <p class="switch-auth">Already have an account? <a href="login.html">Login</a></p>
        <p class="back-home"><a href="home.html">← Back to Home</a></p>
    </div>
</div>

</body>
</html>
