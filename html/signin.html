<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobzy - Create Account</title>
    <link rel="stylesheet" href="../css/signin.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2 class="logo">Jobzy</h2>
        <h3>Create an Account</h3>
        <p>Join Jobzy and find your dream job today</p>
        
        <form>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password" required>
            </div>
            
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>
        
        <p class="switch-auth">Already have an account? <a href="login.html">Login</a></p>
        <p class="back-home"><a href="home.html">← Back to Home</a></p>
    </div>
</div>

</body>
</html>
