<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobzy - Apply for Job</title>
    <link rel="stylesheet" href="../css/apply.css">
    <script src="../js/script.js"></script>
</head>
<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar">
    <h2 class="logo">Jobzy</h2>

    <div class="menu">
        <a href="home.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="companies.html">Companies</a>
        <a href="categories.html">Categories</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="auth">
        <a id="login" href="login.html">Login</a>
        <a id="register" href="signup.html">Register</a>
    </div>
</nav>

<!-- APPLY CONTAINER -->
<div class="apply-container">
    <h2>Apply for this Job</h2>
    <p>Please fill out the form below to submit your application.</p>

    <form id="applyForm" action="jobs.html" method="GET" class="apply-form" novalidate>
        <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>

        <div class="input-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="input-group">
            <label for="resume">Upload Resume (PDF, DOCX)</label>
            <input type="file" id="resume" name="resume" accept=".pdf, .docx" required>
        </div>

        <div class="input-group">
            <label for="coverletter">Cover Letter (Optional)</label>
            <textarea id="coverletter" name="coverletter" rows="5" placeholder="Write a short cover letter..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Application</button>
    </form>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Jobzy | All Rights Reserved</p>
</footer>

</body>
</html>
