<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobzy - Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <script src="../js/script.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2 class="logo">Jobzy</h2>
        <h3>Welcome Back</h3>
        <p>Login to your account to continue</p>
        
        <form id="loginForm" novalidate>
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="off">
            </div>
            
            <button type="submit" class="auth-btn">Login</button>
        </form>
        
        <p class="switch-auth">Don't have an account? <a href="signin.html">Sign Up</a></p>
        <p class="back-home"><a href="home.html">← Back to Home</a></p>
    </div>
</div>

</body>
</html>
